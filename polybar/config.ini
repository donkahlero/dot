include-file = $HOME/.config/polybar/mocha.ini

[module/ewmh]
type = internal/xworkspaces
pin-workspaces = true
enable-click = true
enable-scroll = true
reverse-scroll = true
format = <label-state>
label-active = %name%
label-active-foreground = #ffffff
label-active-background = #3f3f3f
label-active-underline = #fba922
label-active-padding = 2px
label-occupied = %name%
label-occupied-underline = #555555
label-occupied-padding = 2px
label-urgent = %name%
label-urgent-foreground = #000000
label-urgent-background = #bd2c40
label-urgent-underline = #9b0a20
label-urgent-padding = 2px
label-empty = %name%
label-empty-foreground = #55
label-empty-padding = 2px

[module/title]
type = internal/xwindow
label-maxlen = 50

[module/tray]
type = internal/tray
tray-spacing = 8px
tray-size = 80%:-10pt

[module/system-bluetooth-bluetoothctl]
type = custom/script
exec = ~/.config/polybar/system-bluetooth-bluetoothctl.sh
tail = true
click-left = ~/polybar-scripts/system-bluetooth-bluetoothctl.sh --toggle &

[module/network]
type = internal/network
interface = wlp4s0
interface-type = wireless
interval = 3.0
format-connected = %{A1:networkmanager_dmenu:}<label-connected>%{A}
format-disconnected = %{A1:networkmanager_dmenu:}<label-disconnected>%{A}
label-connected = "´ç½ %essid%"
label-disconnected = not connected

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = true
interval = 5
format-volume = <ramp-volume> <label-volume>
label-muted = "´æª MUTED"
label-muted-foreground = #666
ramp-volume-0 = "´Çª"
ramp-volume-1 = "´Çº"
ramp-volume-2 = "´Ç¿"

[module/backlight]
type = internal/backlight
card = intel_backlight
enable-scroll = true
format = "<ramp> <label>"
label = %percentage%%
ramp-0 = "¯Äì"
ramp-1 = "¯Äñ"
ramp-2 = "¯Äó"
ramp-3 = "¯Åï"
ramp-4 = "¯Äø"

[module/date]
type = internal/date
interval = 1.0
date = "´Çù %H:%M"
date-alt = "´ü│ %A, %d %B %Y"

[module/battery]
type = internal/battery
full-at = 99
battery = BAT0
adapter = AC
format-charging = "<animation-charging>  <label-charging>"
format-discharging = "<ramp-capacity>  <label-discharging>"
label-charging = %percentage%%
label-discharging = %percentage%%
label-full = "´ÆÆ %percentage%%"
ramp-capacity-0 = ´ëä
ramp-capacity-1 = ´ëâ
ramp-capacity-2 = ´ëé
ramp-capacity-3 = ´ëü
ramp-capacity-4 = ´ëÇ
animation-charging-0 = ´ëä
animation-charging-1 = ´ëâ
animation-charging-2 = ´ëé
animation-charging-3 = ´ëü
animation-charging-4 = ´ëÇ
animation-charging-framerate = 750

[bar/top]
monitor = eDP-1
monitor-strict = false
override-redirect = false
wm-restack = generic
width = 100%
height = 40
background = ${colors.base}
font-0 = MiniMono:size=14
font-1 = Space Mono Nerd Font:size=9;1
modules-left = ewmh
modules-center = title
modules-right = tray system-bluetooth-bluetoothctl network pulseaudio backlight date battery
padding = 10px
module-margin = 5px
separator = "%{F#ea0a8e}|%{F-}"

